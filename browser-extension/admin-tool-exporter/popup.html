<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SEO Session Exporter</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 420px;
      background: #0b1220;
      color: #e5e7eb;
    }
    .wrap {
      padding: 14px;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 4px;
    }
    .sub {
      font-size: 12px;
      color: #9ca3af;
      margin: 0 0 10px;
      word-break: break-all;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: #1f2937;
      color: #f9fafb;
    }
    button.primary {
      background: #2563eb;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    textarea {
      width: 100%;
      box-sizing: border-box;
      min-height: 220px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #111827;
      color: #e5e7eb;
      padding: 8px;
      font-size: 12px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .footer {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .status {
      font-size: 11px;
      color: #93c5fd;
      min-height: 14px;
    }
    .copy-btn {
      min-width: 120px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">SEO Tool Session Exporter</h1>
    <p class="sub" id="site">Loading current tab...</p>

    <div class="buttons">
      <button id="exportCookies">Export Cookies</button>
      <button id="exportLocalStorage">Export LocalStorage</button>
      <button id="exportIndexedDB">Export IndexedDB</button>
      <button id="exportAll" class="primary">Export All</button>
    </div>

    <textarea id="output" spellcheck="false" placeholder="Exported JSON will appear here..."></textarea>

    <div class="footer">
      <div class="status" id="status"></div>
      <button class="copy-btn" id="copyBtn">Copy JSON</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
